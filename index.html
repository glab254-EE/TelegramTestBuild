<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

  <title>Clickr</title>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  >

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --app-height: 100vh;
      --tg-viewport-height: 100vh;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--tg-viewport-height);
      min-height: var(--tg-viewport-height);
      max-height: var(--tg-viewport-height);
    }

    #unity-container {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: var(--tg-viewport-height);
      min-height: var(--tg-viewport-height);
      max-height: var(--tg-viewport-height);
      overflow: hidden;
      background: #000;
    }

    #unity-canvas {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      outline: none;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(70vw, 320px);
      z-index: 10;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 18px;
      background: rgba(255,255,255,0.18);
      border-radius: 999px;
      overflow: hidden;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: #fff;
      border-radius: 999px;
    }

    @supports (height: 100dvh) {
      :root {
        --app-height: 100dvh;
      }

      body,
      #unity-container {
        height: 100dvh;
        min-height: 100dvh;
        max-height: 100dvh;
      }
    }
  </style>
</head>
<body>
  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <div id="unity-loading-bar">
      <div id="unity-progress-bar-empty">
        <div id="unity-progress-bar-full"></div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      function getViewportHeight() {
        if (window.visualViewport && window.visualViewport.height) {
          return window.visualViewport.height + "px";
        }
        return window.innerHeight + "px";
      }

      function applyViewportSize() {
        var height = getViewportHeight();
        document.documentElement.style.setProperty("--tg-viewport-height", height);

        var container = document.getElementById("unity-container");
        var canvas = document.getElementById("unity-canvas");

        if (container) {
          container.style.height = height;
        }

        if (canvas) {
          canvas.style.height = height;
          canvas.style.width = window.innerWidth + "px";
        }
      }

      function initTelegram() {
        if (window.Telegram && window.Telegram.WebApp) {
          try {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand();

            if (window.Telegram.WebApp.setHeaderColor) {
              window.Telegram.WebApp.setHeaderColor("#000000");
            }

            if (window.Telegram.WebApp.setBackgroundColor) {
              window.Telegram.WebApp.setBackgroundColor("#000000");
            }
          } catch (e) {
            console.warn("Telegram WebApp init error:", e);
          }
        }
      }

      window.addEventListener("resize", applyViewportSize);
      window.addEventListener("orientationchange", function () {
        setTimeout(applyViewportSize, 50);
        setTimeout(applyViewportSize, 250);
      });

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", applyViewportSize);
        window.visualViewport.addEventListener("scroll", applyViewportSize);
      }

      initTelegram();
      applyViewportSize();

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/TelegramTestBuild.loader.js";

      var config = {
        dataUrl: buildUrl + "/TelegramTestBuild.data",
        frameworkUrl: buildUrl + "/TelegramTestBuild.framework.js",
        codeUrl: buildUrl + "/TelegramTestBuild.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "GamerGameGames",
        productName: "Clickr",
        productVersion: "0.2",
        matchWebGLToCanvasSize: true,
        devicePixelRatio: 1
      };

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = function () {
        createUnityInstance(canvas, config, function (progress) {
          if (progressBarFull) {
            progressBarFull.style.width = (100 * progress) + "%";
          }
        }).then(function (unityInstance) {
          if (loadingBar) {
            loadingBar.style.display = "none";
          }

          applyViewportSize();

          window.addEventListener("resize", function () {
            applyViewportSize();
            if (unityInstance && unityInstance.Module && unityInstance.Module.canvas) {
              unityInstance.Module.canvas.style.width = "100%";
              unityInstance.Module.canvas.style.height = "100%";
            }
          });
        }).catch(function (message) {
          alert(message);
        });
      };

      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
